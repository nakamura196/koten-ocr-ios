name: KotenOCR
options:
  bundleIdPrefix: com.nakamura196
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  KotenOCR:
    type: application
    platform: iOS
    sources:
      - path: KotenOCR
        excludes:
          - "Models/**"
      - path: KotenOCR/Models
        type: folder
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: KotenOCR/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.nakamura196.kotenocr
        MARKETING_VERSION: "1.3.0"
        CURRENT_PROJECT_VERSION: "8"
        DEVELOPMENT_TEAM: "Q6S8JS6GWV"
        CODE_SIGN_STYLE: "Automatic"
        TARGETED_DEVICE_FAMILY: "1,2"
    entitlements:
      path: KotenOCR/KotenOCR.entitlements
    postBuildScripts:
      - script: |
          # Fix ONNX Runtime MinimumOSVersion mismatch and re-sign
          FW_DIR="${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}/onnxruntime.framework"
          FW_PLIST="${FW_DIR}/Info.plist"
          if [ -f "$FW_PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :MinimumOSVersion ${IPHONEOS_DEPLOYMENT_TARGET}" "$FW_PLIST"
            codesign --force --sign "${EXPANDED_CODE_SIGN_IDENTITY}" --timestamp=none --preserve-metadata=identifier,entitlements "${FW_DIR}"
          fi
        name: Fix ONNX Runtime and re-sign
    dependencies:
      - package: onnxruntime-swift-package-manager
        product: onnxruntime

  KotenOCRTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KotenOCRTests
    dependencies:
      - target: KotenOCR
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nakamura196.kotenocr.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/KotenOCR.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/KotenOCR"
        BUNDLE_LOADER: "$(TEST_HOST)"

  KotenOCRUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: KotenOCRUITests
        excludes:
          - "Resources/**"
    dependencies:
      - target: KotenOCR
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nakamura196.kotenocr.uitests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  KotenOCR:
    build:
      targets:
        KotenOCR: all
        KotenOCRTests: [test]
    run:
      config: Debug
      storeKitConfiguration: KotenOCR/TipJar.storekit
    test:
      targets:
        - KotenOCRTests
        - KotenOCRUITests

packages:
  onnxruntime-swift-package-manager:
    url: https://github.com/microsoft/onnxruntime-swift-package-manager
    from: "1.20.0"
